name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"
          enable-cache: true

      - name: Install Qt system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1 libegl1 libxkbcommon-x11-0 libglu1-mesa

      - name: Install dependencies
        run: uv sync --extra dev --extra optional

      - name: Check key imports
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          uv run python -c "import PyQt5; print('PyQt5 OK')"
          uv run python -c "import gmsh; print('gmsh OK')"
          uv run python -c "import meshio; print('meshio OK')"
          uv run python -c "import shapely; print('shapely OK')"
          uv run python -c "import mesh_gui_project; print('mesh_gui_project OK')"

      - name: Run tests (excluding slow tests)
        env:
          QT_QPA_PLATFORM: offscreen
        run: uv run pytest tests/ -v -m "not slow" --tb=short
