name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Qt system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1 libegl1 libxkbcommon-x11-0

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov
          pip install -e .

      - name: Check key imports
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          python -c "import PyQt5; print('PyQt5 OK')"
          python -c "import gmsh; print('gmsh OK')"
          python -c "import meshio; print('meshio OK')"
          python -c "import shapely; print('shapely OK')"
          python -c "import mesh_gui_project; print('mesh_gui_project OK')"

      - name: Run tests (excluding slow tests)
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          python -m pytest tests/ -v -m "not slow" --tb=short
